<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Servicios NOSO</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .contenedor-historial { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #1a365d; color: white; }
        .btn-volver { display: inline-block; margin-bottom: 20px; padding: 10px 15px; background: #1a365d; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="contenedor-historial">
    <a href="index.html" class="btn-volver">← Volver a Nueva Ficha</a>
    <h2>Historial de Servicios</h2>
    <table id="tablaHistorial">
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Ficha N°</th>
                <th>Cliente</th>
                <th>Marca/Modelo</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla">
            <!-- Aquí aparecerán los datos automáticamente -->
        </tbody>
    </table>
</div>

<script>
    // Leemos los datos del LocalStorage
    const historial = JSON.parse(localStorage.getItem('noso_historial') || '[]');
    const cuerpoTabla = document.getElementById('cuerpoTabla');

    if (historial.length === 0) {
        cuerpoTabla.innerHTML = '<tr><td colspan="4">No hay servicios registrados aún.</td></tr>';
    } else {
        historial.forEach(item => {
            const fila = `<tr>
                <td>${item.fecha}</td>
                <td>${item.id}</td>
                <td>${item.cliente}</td>
                <td>${item.marca} - ${item.modelo}</td>
            </tr>`;
            cuerpoTabla.innerHTML += fila;
        });
    }
</script>

</body>
</html>
