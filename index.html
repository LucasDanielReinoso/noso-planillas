<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ficha Técnica NOSO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
<div class="ficha-contenedor">
    <div class="header-banner">
        <table class="header-table">
            <tr>
                <td>
                    <div class="brand-title">NOSO</div>
                    <div class="brand-subtitle">Refrigeración & Climatización</div>
                </td>
                <td>
                    <div class="doc-title">FICHA DE SERVICIO TÉCNICO</div>
                    <div class="doc-meta">
                        <strong>Ficha N°:</strong> <input type="text" id="fichaNum" placeholder=""> <br>
                        <strong>Fecha:</strong> <input type="text" id="fecha" placeholder="">
                    </div>
                </td>
            </tr>
        </table>
    </div>

    <div class="section-title">1. Datos del Cliente y Ubicación</div>
    <table class="data-table">
        <tr>
            <td class="field-label">Cliente</td>
            <td class="field-value"><input type="text" id="cliente" class="input-table"></td>
            <td class="field-label">Teléfono</td>
            <td class="field-value"><input type="text" id="telefono" class="input-table"></td>
        </tr>
        <tr>
            <td class="field-label">Dirección</td>
            <td class="field-value"><input type="text" id="direccion" class="input-table"></td>
            <td class="field-label">Ubicación Eq.</td>
            <td class="field-value"><input type="text" id="ubicacionEq" class="input-table"></td>
        </tr>
    </table>

    <div class="section-title">2. Identificación del Equipo</div>
    <table class="data-table">
        <tr>
            <td class="field-label">Marca</td>
            <td class="field-value"><input type="text" id="marca" class="input-table"></td>
            <td class="field-label">Modelo</td>
            <td class="field-value"><input type="text" id="modelo" class="input-table"></td>
        </tr>
        <tr>
            <td class="field-label">Capacidad</td>
            <td class="field-value"><input type="text" id="capacidad" class="input-table"></td>
            <td class="field-label">N° Serie</td>
            <td class="field-value"><input type="text" id="numSerie" class="input-table"></td>
        </tr>
    </table>

    <!-- ... (El resto de tu estructura HTML se mantiene igual aquí) ... -->

    <button class="btn-print" onclick="guardarYImprimir()">Imprimir / Guardar PDF</button>
</div>

<script>
    function guardarYImprimir() {
        // Recopilamos todos los datos importantes
        const datosServicio = {
            id: document.getElementById('fichaNum').value || 'Sin N°',
            fecha: document.getElementById('fecha').value || new Date().toLocaleDateString(),
            cliente: document.getElementById('cliente').value || 'Sin nombre',
            marca: document.getElementById('marca').value || 'N/A',
            modelo: document.getElementById('modelo').value || 'N/A',
            guardadoEl: new Date().toLocaleString()
        };

        // Guardamos en LocalStorage
        let historial = JSON.parse(localStorage.getItem('noso_historial') || '[]');
        historial.push(datosServicio);
        localStorage.setItem('noso_historial', JSON.stringify(historial));

        // Ejecutamos impresión
        window.print();
    }
</script>
</body>
</html>
